spring.application.name=realtimeordertracker

# H2 Console ( /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# H2 In-Memory (DEV)
spring.datasource.url=jdbc:h2:mem:[your_db_name];DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=[your_username]
spring.datasource.password=[your_password]
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 File-based
#spring.datasource.url=${DB_URL:jdbc:h2:file:/app/data/[your_db_name]}
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=${DB_USERNAME:[your_username]}
#spring.datasource.password=${DB_PASSWORD:[your_password]}
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update
#spring.h2.console.enabled=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aurandri.realtimeordertracker.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topic.order-events=order-events

# Active profile
spring.profiles.active=${APP_PROFILE:dev}

# Dev-tools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true