spring.application.name=realtimeordertracker

# =========================
# Database
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/${POSTGRES_DB:realtimeordertrackerdb}}
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# =========================
# Kafka
# =========================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aurandri.realtimeordertracker.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topic.order-events=${KAFKA_TOPIC:order-events}

# =========================
# Profile
# =========================
spring.profiles.active=${APP_PROFILE:dev}

# =========================
# Devtools
# =========================
spring.devtools.restart.enabled=${DEVTOOLS_ENABLED:false}
spring.devtools.livereload.enabled=${DEVTOOLS_ENABLED:false}